apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: orbit
resources:
  - deployment.yaml
  - service.yaml
# Single place to point at your registry. Argo CD Image Updater bumps newTag.
images:
  - name: orbit-ui
    newName: ghcr.io/your-org/orbit-ui
    newTag: latest
