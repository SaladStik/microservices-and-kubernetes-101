# The only Service exposed outside the cluster. NodePorts map to host 80 and 443 via kind.
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: orbit
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443
