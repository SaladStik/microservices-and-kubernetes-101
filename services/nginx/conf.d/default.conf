# Edge proxy, the only public surface. Terminates TLS, denies by default.
# Notes in services/nginx/NOTES.md

# HTTP :80, always upgrade to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS :443, the real edge
server {
    listen 443 ssl;
    server_name _;

    # TLS terminates here, certs mounted at /etc/nginx/certs
    ssl_certificate     /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # use Docker DNS and resolve backends per request, so rebuilding a service
    # does not leave nginx pointing at a dead container
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $ui_svc   http://ui:80;
    set $auth_svc http://auth:3000;
    set $gw_svc   http://node-gateway:4000;

    # one favicon for the whole site, served by the edge
    location = /favicon.svg { alias /etc/nginx/static/favicon.svg; access_log off; }
    location = /favicon.ico { return 204; access_log off; }  # legacy request, no .ico

    # auth_request target, internal only, forwards just the cookie
    location = /_auth {
        internal;
        proxy_pass              $auth_svc/internal/verify;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        Cookie $http_cookie;
    }

    # public auth endpoints, synchronous to the auth service
    location = /api/login  { proxy_pass $auth_svc; }
    location = /api/logout { proxy_pass $auth_svc; }
    location = /api/me     { proxy_pass $auth_svc; }  # the auth service returns 401 itself

    # protected, enqueue a job straight to the gateway, returns 202
    location = /api/jobs {
        auth_request        /_auth;
        auth_request_set    $auth_user $upstream_http_x_auth_user;
        proxy_set_header    X-Auth-User $auth_user;
        proxy_pass          $gw_svc/jobs;
    }

    # protected, worker up and down toggle for the demo
    location = /api/worker {
        auth_request        /_auth;
        proxy_pass          $gw_svc/worker;
    }

    # protected, count of workers ready to process
    location = /api/workers {
        auth_request        /_auth;
        proxy_pass          $gw_svc/workers;
    }

    # protected, autoscaling on and off toggle for the demo
    location = /api/autoscale {
        auth_request        /_auth;
        proxy_pass          $gw_svc/autoscale;
    }

    # protected, WebSocket for async job results
    location = /ws {
        auth_request        /_auth;
        auth_request_set    $auth_user $upstream_http_x_auth_user;
        proxy_set_header    X-Auth-User $auth_user;

        proxy_pass          $gw_svc;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_read_timeout  3600s;
    }

    # Default deny for sensitive prefixes
    location /api/      { return 403; }
    location /internal/ { return 403; }

    # public UI shell, data still needs a session via /api/jobs and /ws
    location / {
        proxy_pass $ui_svc;
    }
}
