# UI Application, Image Updater rolls it when CI pushes a newer image.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orbit-ui
  namespace: argocd
  annotations:
    # Watch this image under the alias `img`. Replace your-org.
    argocd-image-updater.argoproj.io/image-list: img=ghcr.io/your-org/orbit-ui
    # newest-build picks the most recently pushed tag. CI tags with the commit SHA.
    argocd-image-updater.argoproj.io/img.update-strategy: newest-build
    # Only consider tags that look like a SHA, never `latest`.
    argocd-image-updater.argoproj.io/img.allow-tags: regexp:^[0-9a-f]{7,40}$
    # Which kustomize image name to rewrite. It matches images[].name in kustomization.
    argocd-image-updater.argoproj.io/img.kustomize.image-name: orbit-ui
    # Commit the new tag back to git so Argo CD stays the source of truth.
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: orbit
  source:
    repoURL: https://github.com/your-org/orbit-microservices-k8s.git
    targetRevision: main
    path: services/ui/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: orbit
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
