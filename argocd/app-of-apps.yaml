# App of apps root, pulls in every child Application under argocd/apps. Replace your-org.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orbit-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: orbit
  source:
    repoURL: https://github.com/your-org/orbit-microservices-k8s.git
    targetRevision: main
    path: argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
