# KRaft node pool, each node is controller and broker. Three node quorum tolerates one loss.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: quorum
  namespace: orbit
  labels:
    strimzi.io/cluster: orbit-kafka
spec:
  replicas: 3
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 5Gi
        deleteClaim: false
        kraftMetadata: shared
