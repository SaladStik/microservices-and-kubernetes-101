# Strimzi managed Kafka, node pools and KRaft on. RF 3 min isr 2 survives one broker loss.
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: orbit-kafka
  namespace: orbit
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.8.0
    metadataVersion: 3.8-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
  entityOperator:
    topicOperator: {}   # lets us manage topics as KafkaTopic resources
    userOperator: {}
